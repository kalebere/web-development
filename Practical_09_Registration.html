<!DOCTYPE html>
<html>
<head>
    <title>Employee Registration Form</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="file"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            height: 80px;
        }
        .radio-group, .checkbox-group {
            margin-top: 5px;
        }
        .radio-group label, .checkbox-group label {
            display: inline;
            margin-right: 15px;
            font-weight: normal;
        }
        input[type="radio"], input[type="checkbox"] {
            margin-right: 5px;
        }
        .btn-submit {
            background-color: #4CAF50;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #45a049;
        }
        .btn-reset {
            background-color: #f44336;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 10px;
        }
        .required {
            color: red;
        }
    </style>
</head>
<body>
<link rel="stylesheet" href="identity.css">
<div class="student-identity-banner">
    <div class="student-info-left">
        <h1 class="student-name">Sahil Kalebere</h1>
        <div class="student-meta">
            <span>Roll No: 129</span>
            <span class="meta-separator"></span>
            <span>SY(CSE)</span>
        </div>
    </div>
    
</div>


<div class="container">
    <h2>Employee Registration Form</h2>
    
    <form action="#" method="post">
        
        <div class="form-group">
            <label>Full Name <span class="required">*</span></label>
            <input type="text" name="fullname" required>
        </div>

        <div class="form-group">
            <label>Email Address <span class="required">*</span></label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Phone Number <span class="required">*</span></label>
            <input type="tel" name="phone" required>
        </div>

        <div class="form-group">
            <label>Date of Birth <span class="required">*</span></label>
            <input type="date" name="dob" required>
        </div>

        <div class="form-group">
            <label>Gender <span class="required">*</span></label>
            <div class="radio-group">
                <input type="radio" name="gender" value="male" id="male" required>
                <label for="male">Male</label>
                
                <input type="radio" name="gender" value="female" id="female">
                <label for="female">Female</label>
                
                <input type="radio" name="gender" value="other" id="other">
                <label for="other">Other</label>
            </div>
        </div>

        <div class="form-group">
            <label>Department <span class="required">*</span></label>
            <select name="department" required>
                <option value="">-- Select Department --</option>
                <option value="hr">Human Resources</option>
                <option value="it">IT Department</option>
                <option value="sales">Sales & Marketing</option>
                <option value="finance">Finance</option>
                <option value="operations">Operations</option>
            </select>
        </div>

        <div class="form-group">
            <label>Position <span class="required">*</span></label>
            <input type="text" name="position" required>
        </div>

        <div class="form-group">
            <label>Joining Date <span class="required">*</span></label>
            <input type="date" name="joining_date" required>
        </div>

        <div class="form-group">
            <label>Skills</label>
            <div class="checkbox-group">
                <input type="checkbox" name="skills[]" value="communication" id="comm">
                <label for="comm">Communication</label><br>
                
                <input type="checkbox" name="skills[]" value="teamwork" id="team">
                <label for="team">Teamwork</label><br>
                
                <input type="checkbox" name="skills[]" value="leadership" id="lead">
                <label for="lead">Leadership</label><br>
                
                <input type="checkbox" name="skills[]" value="technical" id="tech">
                <label for="tech">Technical Skills</label>
            </div>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea name="address" placeholder="Enter your complete address"></textarea>
        </div>

        <div class="form-group">
            <label>Upload Resume</label>
            <input type="file" name="resume" accept=".pdf,.doc,.docx">
        </div>

        <div class="form-group">
            <label>Upload Photo</label>
            <input type="file" name="photo" accept="image/*">
        </div>

        <button type="submit" class="btn-submit">Register Employee</button>
        <button type="reset" class="btn-reset">Clear Form</button>
        
    </form>
</div>

</body>
</html>
